<!doctype html>
<html lang="zh-CN" data-page-shell="index-page-v1">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=index.html">
  <link rel="canonical" href="index.html">
  <title>多智能体系统｜兼容入口</title>
  <style>
    :root {
      --bg: #d8d4cc;
      --paper: #fbfaf6;
      --ink: #24221f;
      --muted: #67645d;
      --line: rgba(36, 34, 31, .18);
      --rail: #232320;
      --accent: #216d5d;
      --lime: #d7ef66;
      --shadow: 0 14px 28px rgba(60, 56, 48, .10);
      --sans: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      --serif: "Songti SC", "Noto Serif CJK SC", STSong, SimSun, serif;
      --mono: "Cascadia Code", Consolas, "SFMono-Regular", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.76;
      background:
        linear-gradient(90deg, rgba(17, 17, 17, .035) 1px, transparent 1px) 0 0 / 72px 72px,
        linear-gradient(rgba(17, 17, 17, .03) 1px, transparent 1px) 0 0 / 72px 72px,
        var(--bg);
    }
    .layout { display: grid; grid-template-columns: 284px minmax(0, 1fr); min-height: 100vh; }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 17px;
      color: #f4f0e8;
      background: var(--rail);
    }
    .brand {
      padding: 15px;
      margin-bottom: 16px;
      border: 1px solid rgba(226, 222, 218, .22);
      border-radius: 8px;
      background: rgba(255, 255, 255, .045);
    }
    .brand strong { display: block; font-family: var(--serif); font-size: 22px; font-weight: 800; line-height: 1.2; }
    .brand span { display: block; margin-top: 8px; color: #c9c3b7; font-size: 13px; }
    nav { display: grid; gap: 5px; }
    nav a {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      color: #eee9dd;
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 13.5px;
    }
    nav a:hover { background: rgba(255, 255, 255, .075); border-color: rgba(255, 255, 255, .16); }
    .dot { width: 10px; height: 10px; background: var(--lime); border-radius: 2px; box-shadow: 0 0 0 3px rgba(215, 239, 102, .11); }
    .side-note {
      margin-top: 20px;
      padding: 13px;
      color: #d8d1c5;
      background: rgba(255, 255, 255, .055);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 6px;
      font-size: 13px;
    }
    main{min-width:0; width: 100%; padding: 30px 38px; }
    .hero,
    section {
      position: relative;
      background:
        linear-gradient(90deg, rgba(36, 34, 31, .025) 1px, transparent 1px),
        linear-gradient(rgba(36, 34, 31, .022) 1px, transparent 1px),
        rgba(251, 250, 246, .97);
      background-size: 32px 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 22px;
      padding: 30px;
      border-left: 6px solid var(--ink);
      border-top: 0;
    }
    section { margin-top: 14px; padding: 23px 24px; }
    .kicker { margin-bottom: 10px; color: var(--accent); font-size: 13px; font-weight: 900; }
    h1, h2 { margin: 0; font-family: var(--serif); font-weight: 800; letter-spacing: 0; }
    h1 { font-size: 38px; line-height: 1.12; }
    h2 { font-size: 24px; line-height: 1.25; }
    p { margin: 8px 0; color: var(--muted); }
    .box {
      padding: 14px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid var(--line);
      border-radius: 7px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      padding: 9px 12px;
      color: #fff;
      background: var(--rail);
      border-radius: 5px;
      text-decoration: none;
      font-weight: 800;
    }
    @media (max-width: 940px) {
      .layout { grid-template-columns: minmax(0, 1fr); }
      aside { position: static; height: auto; }
      main{min-width:0;width:100%; padding: 18px; }
      .hero { grid-template-columns: minmax(0, 1fr); padding: 22px 18px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">
        <strong>多智能体系统</strong>
        <span>兼容入口</span>
      </div>
      <nav aria-label="兼容入口导航">
        <a href="index.html"><span class="dot"></span>打开课程地图</a>
        <a href="../index.html"><span class="dot"></span>返回 Agent 研习资料</a>
      </nav>
      <div class="side-note">旧入口保留用于兼容书签；正式课程地图已迁移到同级 index.html。</div>
    </aside>
    <main>
      <header class="hero">
        <div>
          <div class="kicker">课程索引兼容入口</div>
          <h1>多智能体系统</h1>
          <p>页面会自动跳转到同级 <a href="index.html">index.html</a>。如果浏览器没有跳转，可以使用右侧入口手动打开。</p>
        </div>
        <div class="box">
          <h2>继续学习</h2>
          <p>正式课程地图包含推荐路线、前置知识和单元入口。</p>
          <a class="button" href="index.html">打开 index.html</a>
        </div>
      </header>
    </main>
  </div>
</body>
</html>
