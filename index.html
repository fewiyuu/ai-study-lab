<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Study Lab</title>
  <meta name="description" content="AI、大模型、Agent、算法与工程学习资料目录。">
  <style>
    :root {
      --paper: #f7f4ec;
      --ink: #171717;
      --muted: #666154;
      --line: #d8d0bf;
      --panel: #fffdf7;
      --panel-2: #eee8db;
      --accent: #0b6bcb;
      --accent-2: #bf3f2f;
      --green: #26745d;
      --shadow: 0 18px 50px rgba(42, 35, 21, .10);
      --mono: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      --sans: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      --serif: "Songti SC", "Noto Serif CJK SC", "SimSun", serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--sans);
      background:
        linear-gradient(90deg, rgba(23, 23, 23, .045) 1px, transparent 1px) 0 0 / 42px 42px,
        linear-gradient(rgba(23, 23, 23, .035) 1px, transparent 1px) 0 0 / 42px 42px,
        radial-gradient(circle at 14% 10%, rgba(11, 107, 203, .12), transparent 28%),
        radial-gradient(circle at 86% 6%, rgba(191, 63, 47, .10), transparent 24%),
        var(--paper);
      line-height: 1.65;
    }

    a { color: inherit; }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 28px 22px;
      border-right: 1px solid var(--line);
      background: rgba(255, 253, 247, .84);
      backdrop-filter: blur(16px);
    }

    .brand {
      padding-bottom: 22px;
      border-bottom: 2px solid var(--ink);
    }

    .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      margin-bottom: 16px;
      color: #fff;
      background: var(--ink);
      font-family: var(--mono);
      font-weight: 800;
      letter-spacing: -.04em;
    }

    h1 {
      margin: 0;
      max-width: 9ch;
      font-family: var(--serif);
      font-size: 44px;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .search-box {
      margin: 24px 0 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    input[type="search"] {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-bottom: 3px solid var(--ink);
      border-radius: 0;
      outline: none;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11, 107, 203, .14);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0 22px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .stat strong {
      display: block;
      font-family: var(--mono);
      font-size: 24px;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .topic-nav {
      display: grid;
      gap: 6px;
    }

    .topic-nav a {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(216, 208, 191, .86);
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
    }

    .topic-nav a:hover {
      color: var(--ink);
    }

    main {
      min-width: 0;
      padding: 42px clamp(18px, 4vw, 64px) 64px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 420px);
      gap: 28px;
      align-items: end;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      width: max-content;
      padding: 4px 8px;
      border: 1px solid var(--ink);
      background: var(--panel);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .hero h2 {
      margin: 18px 0 0;
      max-width: 13ch;
      font-family: var(--serif);
      font-size: clamp(44px, 8vw, 92px);
      line-height: .94;
      letter-spacing: 0;
    }

    .hero-copy {
      color: var(--muted);
      font-size: 16px;
    }

    .hero-copy a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(11, 107, 203, .35);
    }

    .status {
      min-height: 28px;
      margin: 26px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .topics {
      display: grid;
      gap: 24px;
    }

    .topic {
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, .72);
      box-shadow: var(--shadow);
    }

    .topic-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .topic h3 {
      margin: 0;
      font-family: var(--serif);
      font-size: 31px;
      line-height: 1.15;
    }

    .count {
      padding: 4px 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
    }

    .course-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--line);
    }

    .card {
      min-height: 148px;
      padding: 18px;
      background: var(--panel);
      text-decoration: none;
      transition: background .16s ease, transform .16s ease;
    }

    .card:hover {
      background: #fff;
      transform: translateY(-2px);
    }

    .card-title {
      margin: 0;
      font-weight: 700;
      line-height: 1.45;
    }

    .card-path {
      margin-top: 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }

    .badge {
      padding: 2px 6px;
      border: 1px solid rgba(216, 208, 191, .9);
      color: var(--muted);
      font-size: 11px;
      background: #fbf7ed;
    }

    .empty {
      display: none;
      padding: 30px;
      border: 1px dashed var(--line);
      background: rgba(255, 253, 247, .65);
      color: var(--muted);
    }

    .error {
      padding: 18px;
      border: 1px solid rgba(191, 63, 47, .45);
      background: rgba(191, 63, 47, .08);
      color: #7a281e;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      aside {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      h1 { max-width: none; font-size: 38px; }
      .hero { grid-template-columns: 1fr; }
      .hero h2 { max-width: 10ch; }
      main { padding-top: 30px; }
    }

    @media (max-width: 560px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .topic-head { grid-template-columns: 1fr; }
      .course-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">
        <div class="brand-mark">AI</div>
        <h1>AI Study Lab</h1>
        <p class="subtitle">大模型、Agent、算法和工程学习页的公开目录。</p>
      </div>

      <div class="search-box">
        <label for="search">Filter</label>
        <input id="search" type="search" autocomplete="off" placeholder="搜索主题、课程、路径">
      </div>

      <div class="stats">
        <div class="stat"><strong id="topicCount">0</strong><span>主题</span></div>
        <div class="stat"><strong id="pageCount">0</strong><span>学习页</span></div>
      </div>

      <nav id="topicNav" class="topic-nav" aria-label="主题导航"></nav>
    </aside>

    <main>
      <section class="hero">
        <div>
          <div class="kicker">public study archive</div>
          <h2>Learning pages, not loose notes.</h2>
        </div>
        <p class="hero-copy">
          这里整理的是一组可直接打开的 HTML 学习页，覆盖大语言模型、Agent、算法、Context Engineering、PyTorch 和机器学习课程。
          原始仓库见 <a href="https://github.com/fewiyuu/ai-study-lab">GitHub</a>。
        </p>
      </section>

      <div id="status" class="status">正在读取目录...</div>
      <div id="empty" class="empty">没有匹配的学习页。</div>
      <section id="topics" class="topics" aria-live="polite"></section>
    </main>
  </div>

  <script>
    const OWNER = "fewiyuu";
    const REPO = "ai-study-lab";
    const BRANCH = "main";
    const treeApi = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
    const pagesRoot = `https://${OWNER}.github.io/${REPO}/`;

    const state = {
      pages: [],
      topics: new Map(),
      query: ""
    };

    const topicOrder = [
      "大语言模型",
      "AI大模型",
      "Agent",
      "Agent Skills",
      "Context Engineering",
      "Learn claude code",
      "算法",
      "深度学习",
      "PyTorch深度学习实践 刘二大人",
      "李宏毅 LLM大模型",
      "李宏毅  机器学习",
      "LoRA论文精读",
      "计算机教育中缺失的一课"
    ];

    const els = {
      topics: document.getElementById("topics"),
      nav: document.getElementById("topicNav"),
      status: document.getElementById("status"),
      empty: document.getElementById("empty"),
      search: document.getElementById("search"),
      topicCount: document.getElementById("topicCount"),
      pageCount: document.getElementById("pageCount")
    };

    function encodePath(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function cleanTitle(path) {
      const parts = path.split("/");
      const pageDir = parts.at(-2) || parts.at(-1).replace(/\.html$/i, "");
      return pageDir
        .replace(/^(P\d+)[_-]?/, "$1 ")
        .replace(/^(\d+)[_-]?/, "$1 ")
        .replace(/_/g, " ")
        .trim();
    }

    function tagsFor(path) {
      const parts = path.split("/");
      const tags = [];
      if (parts.includes("研习资料")) tags.push("研习资料");
      const studyIndex = parts.indexOf("研习资料");
      if (studyIndex >= 0 && parts[studyIndex + 1] && parts[studyIndex + 1] !== "学习页.html") {
        tags.push(parts[studyIndex + 1]);
      }
      return tags.slice(0, 3);
    }

    function groupPages(files) {
      const pages = files
        .filter(file => file.type === "blob" && file.path.endsWith("学习页.html"))
        .map(file => {
          const topic = file.path.split("/")[0];
          return {
            topic,
            path: file.path,
            title: cleanTitle(file.path),
            href: pagesRoot + encodePath(file.path),
            tags: tagsFor(file.path)
          };
        });

      const topics = new Map();
      for (const page of pages) {
        if (!topics.has(page.topic)) topics.set(page.topic, []);
        topics.get(page.topic).push(page);
      }
      for (const list of topics.values()) {
        list.sort((a, b) => a.path.localeCompare(b.path, "zh-Hans-CN"));
      }
      return { pages, topics };
    }

    function topicSort(a, b) {
      const ai = topicOrder.indexOf(a);
      const bi = topicOrder.indexOf(b);
      if (ai !== -1 || bi !== -1) {
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      }
      return a.localeCompare(b, "zh-Hans-CN");
    }

    function matches(page, query) {
      if (!query) return true;
      const haystack = [page.topic, page.title, page.path, ...page.tags].join(" ").toLowerCase();
      return haystack.includes(query.toLowerCase());
    }

    function render() {
      const query = state.query.trim();
      const filtered = state.pages.filter(page => matches(page, query));
      const grouped = new Map();
      for (const page of filtered) {
        if (!grouped.has(page.topic)) grouped.set(page.topic, []);
        grouped.get(page.topic).push(page);
      }

      const topicNames = [...grouped.keys()].sort(topicSort);
      els.topicCount.textContent = topicNames.length;
      els.pageCount.textContent = filtered.length;
      els.empty.style.display = filtered.length ? "none" : "block";

      els.nav.innerHTML = topicNames.map(topic => {
        const id = "topic-" + btoa(unescape(encodeURIComponent(topic))).replace(/=+$/, "");
        return `<a href="#${id}"><span>${topic}</span><span>${grouped.get(topic).length}</span></a>`;
      }).join("");

      els.topics.innerHTML = topicNames.map(topic => {
        const id = "topic-" + btoa(unescape(encodeURIComponent(topic))).replace(/=+$/, "");
        const cards = grouped.get(topic).map(page => `
          <a class="card" href="${page.href}">
            <p class="card-title">${escapeHtml(page.title)}</p>
            <div class="card-path">${escapeHtml(page.path)}</div>
            <div class="badge-row">${page.tags.map(tag => `<span class="badge">${escapeHtml(tag)}</span>`).join("")}</div>
          </a>
        `).join("");
        return `
          <article id="${id}" class="topic">
            <div class="topic-head">
              <h3>${escapeHtml(topic)}</h3>
              <span class="count">${grouped.get(topic).length} pages</span>
            </div>
            <div class="course-list">${cards}</div>
          </article>
        `;
      }).join("");

      els.status.textContent = query
        ? `筛选出 ${filtered.length} 个学习页`
        : `已加载 ${state.pages.length} 个学习页`;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    async function load() {
      try {
        const res = await fetch(treeApi, {
          headers: { "Accept": "application/vnd.github+json" }
        });
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const data = await res.json();
        const grouped = groupPages(data.tree || []);
        state.pages = grouped.pages;
        state.topics = grouped.topics;
        render();
      } catch (error) {
        els.status.innerHTML = `<div class="error">目录读取失败：${escapeHtml(error.message)}。可以直接访问 <a href="https://github.com/${OWNER}/${REPO}">GitHub 仓库</a>。</div>`;
      }
    }

    els.search.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    load();
  </script>
</body>
</html>
