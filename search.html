<!doctype html>
<html lang="zh-CN" data-page-shell="search-page-v2">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全站搜索 - AI Study Lab</title>
  <link rel="stylesheet" href="assets/site-v2.css">
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="top-nav-inner">
      <div class="top-nav-left">
        <a href="index.html" class="brand-name">AI Study Lab</a>
        <span class="sep">/</span>
        <span>全站搜索</span>
      </div>
      <div class="top-nav-right">
        <a href="index.html" class="nav-pill">← 返回首页</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-kicker">Search</div>
      <h1 class="hero-title">🔍 全站搜索</h1>
      <p class="hero-desc">搜索课程、知识点、术语……支持中英文和拼音首字母。</p>
      <form class="search-box" role="search" onsubmit="return doSearch()" style="margin-top: 24px;">
        <label for="q" class="sr-only">搜索关键词</label>
        <input type="search" id="q" placeholder="搜索课程、知识点、术语…" autofocus>
        <button type="submit">搜索</button>
      </form>
      <div class="stats" id="stats" style="margin-top: 12px; font-size: 13px; color: var(--text-muted);" aria-live="polite"></div>
    </div>
  </header>

  <!-- Results -->
  <main class="content">
    <div class="result-list" id="results" role="list"></div>
    <div class="empty-state" id="empty" style="display: none;">
      <div class="icon">🔍</div>
      <p>输入关键词开始搜索</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <span><a href="index.html" style="color: var(--text-muted); text-decoration: none;">← 返回首页</a></span>
      <span id="index-status">加载索引中…</span>
    </div>
  </footer>

<script>
let INDEX = [];

fetch('assets/search-index.json')
  .then(r => r.json())
  .then(data => {
    INDEX = data;
    document.getElementById('index-status').textContent = '已索引 ' + INDEX.length + ' 个学习页';
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      document.getElementById('q').value = q;
      doSearch();
    } else {
      document.getElementById('empty').style.display = 'block';
    }
  })
  .catch(() => {
    document.getElementById('index-status').textContent = '⚠️ 索引加载失败，请刷新重试';
  });

function safePath(path) {
  if (!path || typeof path !== 'string') return null;
  path = path.trim();
  if (/^(javascript|data|vbscript):/i.test(path)) return null;
  if (/^\/\//.test(path)) return null;
  if (/^https?:/i.test(path)) return null;
  if (path.startsWith('/') || path.startsWith('\\')) return null;
  return path;
}

function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return false;
  const resultsEl = document.getElementById('results');
  const statsEl = document.getElementById('stats');
  const emptyEl = document.getElementById('empty');
  resultsEl.innerHTML = '';
  emptyEl.style.display = 'none';

  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  const scored = [];

  for (const item of INDEX) {
    const text = (item.title + ' ' + item.course + ' ' + item.summary + ' ' + item.content).toLowerCase();
    let score = 0;
    for (const t of terms) {
      if (item.title.toLowerCase().includes(t)) score += 10;
      if (item.course.toLowerCase().includes(t)) score += 6;
      if (item.summary.toLowerCase().includes(t)) score += 4;
      if (text.includes(t)) score += 1;
    }
    if (score > 0) scored.push({ item, score });
  }

  scored.sort((a, b) => b.score - a.score);
  const top = scored.slice(0, 30);

  statsEl.textContent = top.length > 0 ? '找到 ' + top.length + ' 个结果' : '没有找到结果';

  if (top.length === 0) {
    emptyEl.style.display = 'block';
    emptyEl.innerHTML = '<div class="icon">😕</div><p>没有找到包含 "' + escapeHtml(q) + '" 的内容</p>';
    return false;
  }

  for (const { item } of top) {
    const path = safePath(item.path);
    if (!path) continue;
    const el = document.createElement('a');
    el.className = 'result-item';
    el.href = path;
    el.target = '_blank';
    el.innerHTML = '<h3>' + escapeHtml(item.title) + '</h3>' +
      '<div class="course">' + escapeHtml(item.course || '') + ' · ' + escapeHtml(item.unit || '') + '</div>' +
      '<div class="excerpt">' + highlightTerms(escapeHtml(item.summary || item.content?.substring(0, 200) || ''), terms) + '</div>';
    resultsEl.appendChild(el);
  }

  return false;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function highlightTerms(text, terms) {
  if (!terms.length) return text;
  const pattern = new RegExp('(' + terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')', 'gi');
  return text.replace(pattern, '<mark>$1</mark>');
}
</script>

</body>
</html>
