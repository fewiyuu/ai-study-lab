<!doctype html>
<html lang="zh-CN" data-page-shell="search-page-v1">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>搜索 - AI 学习地图</title>
  <meta name="description" content="在 AI 学习地图全站 418 页内容中搜索学习页、课程和方向。">
  <style>
    :root {
      --bg: #d8d4cc;
      --paper: #fbfaf6;
      --ink: #24221f;
      --muted: #67645d;
      --line: rgba(36, 34, 31, .18);
      --rail: #232320;
      --accent: #216d5d;
      --blue: #386d93;
      --red: #aa4b3f;
      --gold: #a4782c;
      --violet: #685493;
      --lime: #d7ef66;
      --soft: #e8f3ed;
      --warn: #fff0c7;
      --info: #e8eef8;
      --shadow: 0 14px 28px rgba(60, 56, 48, .10);
      --sans: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      --serif: "Songti SC", "Noto Serif CJK SC", STSong, SimSun, serif;
      --mono: "Cascadia Code", Consolas, "SFMono-Regular", monospace;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.68;
      background:
        linear-gradient(90deg, rgba(17, 17, 17, .035) 1px, transparent 1px) 0 0 / 72px 72px,
        linear-gradient(rgba(17, 17, 17, .03) 1px, transparent 1px) 0 0 / 72px 72px,
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    .layout { display: grid; grid-template-columns: 292px minmax(0, 1fr); min-height: 100vh; }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px 17px;
      color: #f4f0e8;
      background: var(--rail);
      border-right: 1px solid rgba(255,255,255,.12);
    }
    .brand {
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(226,222,218,.22);
      border-radius: 8px;
      background: rgba(255,255,255,.045);
    }
    .brand strong { display: block; font-family: var(--serif); font-size: 25px; font-weight: 800; line-height: 1.14; }
    .brand span { display: block; margin-top: 8px; color: #c9c3b7; font-size: 13px; }
    nav a {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      color: #eee9dd;
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 13.5px;
    }
    nav a:hover { background: rgba(255,255,255,.075); border-color: rgba(255,255,255,.16); }
    .dot { width: 10px; height: 10px; flex: 0 0 auto; background: var(--lime); border-radius: 2px; box-shadow: 0 0 0 3px rgba(215,239,102,.11); }
    .side-note { margin-top: 20px; padding: 13px; color: #d8d1c5; background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.14); border-radius: 6px; font-size: 13px; }
    .side-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .side-stats div { padding: 10px; border: 1px solid rgba(255,255,255,.14); border-radius: 6px; background: rgba(255,255,255,.045); }
    .side-stats b { display: block; color: var(--lime); font-family: var(--mono); font-size: 18px; line-height: 1; }
    .side-stats span { color: #c9c3b7; font-size: 12px; }

    main { width: 100%; padding: 28px clamp(24px, 4vw, 56px) 56px; }
    .hero, section {
      position: relative;
      background:
        linear-gradient(90deg, rgba(36,34,31,.025) 1px, transparent 1px),
        linear-gradient(rgba(36,34,31,.022) 1px, transparent 1px),
        rgba(251,250,246,.97);
      background-size: 32px 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 32px;
      border-left: 6px solid var(--accent);
    }
    .kicker { color: var(--accent); font-size: 13px; font-weight: 900; }
    h1 { margin: 0 0 12px; font-family: var(--serif); font-size: clamp(32px, 4vw, 56px); font-weight: 800; line-height: .98; }
    h2 { margin: 0 0 8px; font-family: var(--serif); font-size: 26px; font-weight: 800; line-height: 1.16; }
    p { margin: 8px 0; color: var(--muted); }

    .search-box {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .search-box input {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      font-family: var(--sans);
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255,255,255,.85);
      outline: none;
    }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(33,109,93,.12); }
    .search-box button {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .search-box button:hover { background: #1a5c4e; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .filter-chip {
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.6);
      border: 1px solid var(--line);
      border-radius: 14px;
      cursor: pointer;
      user-select: none;
    }
    .filter-chip.on { color: #1a3c2e; background: var(--soft); border-color: var(--accent); font-weight: 600; }
    .filter-chip:hover { border-color: var(--accent); }

    .stats { margin-top: 12px; font-size: 13px; color: var(--muted); font-family: var(--mono); }
    .stats b { color: var(--ink); }

    section { margin-top: 14px; padding: 23px 24px; }
    section::before { content: ""; position: absolute; top: 22px; bottom: 22px; left: 0; width: 4px; border-radius: 0 3px 3px 0; background: linear-gradient(180deg,var(--accent),rgba(33,109,93,.1)); }
    .result-item {
      padding: 14px 16px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 7px;
      margin-bottom: 8px;
      text-decoration: none;
      display: block;
      transition: transform .05s, box-shadow .15s;
    }
    .result-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(60,56,48,.07);
      border-color: var(--accent);
    }
    .result-item h3 { margin: 0 0 4px; font-size: 16px; font-weight: 700; }
    .result-item .meta { display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .result-item .meta span { padding: 2px 6px; background: rgba(0,0,0,.04); border-radius: 3px; }
    .result-item .summary { margin-top: 6px; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .result-item mark { background: var(--warn); padding: 1px 2px; border-radius: 2px; }
    .no-results { color: var(--muted); text-align: center; padding: 40px; font-size: 15px; }
    .loading { color: var(--muted); text-align: center; padding: 40px; font-size: 15px; }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: minmax(0, 1fr); }
      aside { position: relative; height: auto; border-right: 0; border-bottom: 1px solid rgba(255,255,255,.12); }
      nav { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 5px; }
      main { padding: 18px; }
      .hero { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">
        <strong>AI 学习地图</strong>
        <span>统一入口，但不是清单。先看目标，再进课程。</span>
      </div>
      <nav aria-label="研究地图导航">
        <a href="index.html"><span class="dot"></span>返回首页</a>
        <a href="jobs.html"><span class="dot" style="background:var(--blue)"></span>岗位地图</a>
        <a href="projects/index.html"><span class="dot" style="background:var(--gold)"></span>实战项目</a>
      </nav>
      <div class="side-stats">
        <div><b>418</b><span>索引页</span></div>
        <div><b>29</b><span>课程</span></div>
      </div>
      <div class="side-note">全站搜索基于页面标题、课程标签和内容摘要。支持中文关键词。</div>
    </aside>

    <main>
      <header class="hero">
        <div class="kicker">全站搜索</div>
        <h1>搜索学习地图</h1>
        <p>在 418 页内容、29 门课程、7 条路线中定位你需要的学习页。</p>
        <div class="search-box">
          <input type="text" id="q" placeholder="输入关键词，如：RAG、LoRA、Agent 循环、CUDA..." autocomplete="off">
          <button id="btn">搜索</button>
        </div>
        <div class="filters" id="filters"></div>
        <div class="stats" id="stats">加载索引中...</div>
      </header>

      <section id="results">
        <div class="loading">正在加载搜索索引...</div>
      </section>
    </main>
  </div>

  <script>
    const qEl = document.getElementById('q');
    const btnEl = document.getElementById('btn');
    const filtersEl = document.getElementById('filters');
    const statsEl = document.getElementById('stats');
    const resultsEl = document.getElementById('results');
    let entries = [];
    let courses = new Set();
    let activeCourse = '';

    fetch('search-index.json')
      .then(r => r.json())
      .then(data => {
        entries = data.entries || [];
        entries.forEach(e => { if (e.course) courses.add(e.course); });
        renderFilters();
        statsEl.innerHTML = '已索引 <b>' + entries.length + '</b> 页，涵盖 ' + courses.size + ' 门课程';
        resultsEl.innerHTML = '<div class="no-results">请输入关键词开始搜索</div>';
        // Auto search from URL
        const params = new URLSearchParams(location.search);
        const q = params.get('q');
        if (q) { qEl.value = q; search(q); }
      })
      .catch(e => {
        statsEl.textContent = '索引加载失败';
        resultsEl.innerHTML = '<div class="no-results">无法加载 search-index.json，请检查文件是否存在。</div>';
      });

    function renderFilters() {
      const arr = Array.from(courses).sort();
      if (arr.length === 0) return;
      filtersEl.innerHTML = '<span style="color:var(--muted);font-size:12px;margin-right:4px;">按课程过滤:</span>' +
        arr.map(c => '<span class="filter-chip" data-course="' + c + '">' + c + '</span>').join('');
      filtersEl.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const c = chip.dataset.course;
          activeCourse = activeCourse === c ? '' : c;
          filtersEl.querySelectorAll('.filter-chip').forEach(x => x.classList.toggle('on', x.dataset.course === activeCourse));
          search(qEl.value.trim());
        });
      });
    }

    function search(raw) {
      const q = raw.toLowerCase().trim();
      if (!q && !activeCourse) {
        resultsEl.innerHTML = '<div class="no-results">请输入关键词或选择课程</div>';
        return;
      }
      const terms = q.split(/\s+/).filter(Boolean);
      let filtered = entries;
      if (activeCourse) filtered = filtered.filter(e => e.course === activeCourse);
      if (terms.length > 0) {
        filtered = filtered.filter(e => {
          const text = (e.title + ' ' + e.h1 + ' ' + e.course + ' ' + e.unit + ' ' + e.summary + ' ' + e.description).toLowerCase();
          return terms.every(t => text.includes(t));
        });
      }
      filtered.sort((a, b) => {
        const aTitle = a.title.toLowerCase().includes(q) ? 2 : 0;
        const bTitle = b.title.toLowerCase().includes(q) ? 2 : 0;
        const aH1 = a.h1.toLowerCase().includes(q) ? 1 : 0;
        const bH1 = b.h1.toLowerCase().includes(q) ? 1 : 0;
        return (bTitle + bH1) - (aTitle + aH1);
      });
      renderResults(filtered, terms);
    }

    function renderResults(list, terms) {
      statsEl.innerHTML = '找到 <b>' + list.length + '</b> 条结果';
      if (list.length === 0) {
        resultsEl.innerHTML = '<div class="no-results">未找到匹配内容，换个关键词试试。</div>';
        return;
      }
      resultsEl.innerHTML = list.map(item => {
        let title = escapeHtml(item.title || item.h1 || '未命名');
        let summary = escapeHtml(item.summary || item.description || '');
        if (terms.length) {
          title = highlight(title, terms);
          summary = highlight(summary, terms);
        }
        const meta = [item.course, item.unit].filter(Boolean).map(x => '<span>' + escapeHtml(x) + '</span>').join('');
        const path = item.path.replace(/\/?学习页\.html$/, '/');
        return '<a class="result-item" href="' + item.path + '"><h3>' + title + '</h3><div class="meta">' + meta + '</div><div class="summary">' + summary + '</div></a>';
      }).join('');
    }

    function highlight(text, terms) {
      let out = text;
      terms.forEach(t => {
        const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        out = out.replace(re, '<mark>$1</mark>');
      });
      return out;
    }
    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    qEl.addEventListener('keydown', e => { if (e.key === 'Enter') search(qEl.value.trim()); });
    btnEl.addEventListener('click', () => search(qEl.value.trim()));
  </script>
</body>
</html>
