<!doctype html>
<html lang="zh-CN" data-page-shell="index-page-v1">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=index.html">
  <title>RAG 论文精读｜兼容入口</title>
  <meta name="description" content="兼容旧链接，指向同级 index.html。">
  <style>

    :root {
      --bg: #d8d4cc;
      --paper: #fbfaf6;
      --ink: #24221f;
      --muted: #67645d;
      --line: rgba(36, 34, 31, .18);
      --rail: #232320;
      --accent: #216d5d;
      --accent-2: #0969da;
      --lime: #d7ef66;
      --soft: #e8f3ed;
      --warn: #fff0c7;
      --info: #e8eef8;
      --shadow: 0 14px 28px rgba(60, 56, 48, .10);
      --sans: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      --serif: "Songti SC", "Noto Serif CJK SC", STSong, SimSun, serif;
      --mono: "Cascadia Code", Consolas, "SFMono-Regular", monospace;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.76;
      background:
        linear-gradient(90deg, rgba(17, 17, 17, .035) 1px, transparent 1px) 0 0 / 72px 72px,
        linear-gradient(rgba(17, 17, 17, .03) 1px, transparent 1px) 0 0 / 72px 72px,
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent-2); }
    .layout {
      display: grid;
      grid-template-columns: 284px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px 17px;
      color: #f4f0e8;
      background: var(--rail);
      border-right: 1px solid rgba(255, 255, 255, .12);
    }

    .brand,
    .mark {
      padding: 15px;
      margin-bottom: 16px;
      border: 1px solid rgba(226, 222, 218, .22);
      border-radius: 8px;
      background: rgba(255, 255, 255, .045);
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: auto;
      min-width: 56px;
      min-height: 46px;
      color: var(--lime);
      font-family: var(--mono);
      font-weight: 900;
    }

    .brand strong,
    aside h1 {
      display: block;
      margin: 0;
      color: #f4f0e8;
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand span,
    .subtitle {
      display: block;
      margin-top: 8px;
      color: #c9c3b7;
      font-size: 13px;
    }

    .side-label {
      display: block;
      margin: 20px 0 8px;
      color: #c9c3b7;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    nav a,
    .path-nav a {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
      padding: 8px 10px;
      color: #eee9dd;
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 13.5px;
    }

    nav a:hover,
    nav a.active,
    .path-nav a:hover,
    .path-nav a.active {
      background: rgba(255, 255, 255, .075);
      border-color: rgba(255, 255, 255, .16);
    }

    .dot {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      background: var(--lime);
      border-radius: 2px;
      box-shadow: 0 0 0 3px rgba(215, 239, 102, .11);
    }

    .path-nav span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 34px;
      min-width: 34px;
      height: 24px;
      color: var(--lime);
      background: rgba(215, 239, 102, .08);
      border: 1px solid rgba(215, 239, 102, .28);
      border-radius: 4px;
      box-shadow: none;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 900;
    }

    .side-note {
      margin-top: 20px;
      padding: 13px;
      color: #d8d1c5;
      background: rgba(255, 255, 255, .055);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 6px;
      font-size: 13px;
    }

    main {
      width: 100%;
      
      padding: 30px 38px;
    }

    .hero,
    section,
    .panel {
      position: relative;
      background:
        linear-gradient(90deg, rgba(36, 34, 31, .025) 1px, transparent 1px),
        linear-gradient(rgba(36, 34, 31, .022) 1px, transparent 1px),
        rgba(251, 250, 246, .97);
      background-size: 32px 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 22px;
      padding: 30px;
      border-top: 0;
      border-left: 6px solid var(--ink);
    }

    section,
    .panel {
      margin-top: 14px;
      padding: 23px 24px;
    }

    section::before,
    .panel::before {
      content: "";
      position: absolute;
      top: 22px;
      bottom: 22px;
      left: 0;
      width: 4px;
      border-radius: 0 3px 3px 0;
      background: linear-gradient(180deg, var(--accent), rgba(33, 109, 93, .1));
    }

    .kicker {
      margin-bottom: 10px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: none;
    }

    h1, h2 {
      margin: 0;
      color: var(--ink);
      font-family: var(--serif);
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 { font-size: 38px; line-height: 1.12; }
    h2 { font-size: 24px; line-height: 1.25; }
    .hero h2 { font-size: 38px; line-height: 1.12; }
    h3 { margin: 0 0 7px; color: var(--ink); font-size: 17px; }
    p { margin: 8px 0; }
    ul, ol { padding-left: 21px; }
    li { margin: 4px 0; }
    .muted, .hero p, .hero-copy, .section-head p, .unit p, .flow-card p, .box p { color: var(--muted); }

    .hero-copy .primary,
    .primary,
    .unit a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      margin-top: 12px;
      padding: 8px 11px;
      color: #fff;
      background: var(--rail);
      border: 1px solid var(--rail);
      border-radius: 5px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .primary:hover,
    .unit a:hover { background: var(--accent); border-color: var(--accent); }
    .chips,
    .route,
    .related,
    .bridge {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
    }

    .chip,
    .pill,
    .tag,
    .count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      color: var(--muted);
      background: rgba(255, 255, 255, .46);
      border: 1px solid var(--line);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 12px;
      text-decoration: none;
    }

    .strong,
    .chip.strong { color: var(--ink); border-color: rgba(36, 34, 31, .38); }
    .panel-head,
    .section-head,
    .head {
      display: flex;
      gap: 16px;
      align-items: start;
      justify-content: space-between;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2,
    .section-head h2,
    .head h2 {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .panel-head h2::before,
    .section-head h2::before,
    .head h2::before {
      content: "";
      width: 9px;
      height: 9px;
      background: var(--lime);
      border: 1px solid rgba(36, 34, 31, .32);
      box-shadow: 0 0 0 4px rgba(215, 239, 102, .18);
    }

    .grid2,
    .meta-grid,
    .next,
    .prep {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .grid3,
    .units,
    .flow,
    .structure,
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .box,
    .unit-card,
    .route-card,
    .unit,
    .meta,
    .flow-card,
    .bridge div,
    .prep div,
    .next div,
    .tile,
    .step {
      padding: 14px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid var(--line);
      border-radius: 7px;
    }

    .unit,
    .unit-card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .unit a,
    .unit-card a { width: fit-content; margin-top: auto; }
    .unit-number,
    .no {
      color: var(--accent);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 900;
    }

    .soft { background: var(--soft); border-color: #bfd9ce; }
    .warn { background: var(--warn); border-color: #dfc277; }
    .info { background: var(--info); border-color: #c5d5ef; }
    .arrow { color: var(--muted); font-family: var(--mono); font-size: 12px; }

    @media (max-width: 980px) {
      .layout { grid-template-columns: minmax(0, 1fr); }
      aside {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, .12);
      }
      nav { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 5px; }
      main { width: 100%; padding: 18px; }
      .hero,
      .grid2,
      .grid3,
      .meta-grid,
      .next,
      .prep,
      .section-head,
      .panel-head { grid-template-columns: minmax(0, 1fr); display: grid; }
      h1 { font-size: 30px; }
      .hero h2 { font-size: 30px; }
    }

  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">
        <strong>RAG 论文精读</strong>
        <span>兼容入口</span>
      </div>
      <nav aria-label="兼容入口导航">
        <a href="index.html"><span class="dot"></span>打开课程地图</a>
        <a href="../index.html"><span class="dot"></span>返回上级地图</a>
      </nav>
      <div class="side-note">旧链接会自动转到同级 index.html。</div>
    </aside>
    <main>
      <header class="hero" id="overview">
        <div>
          <div class="kicker">兼容入口</div>
          <h1>RAG 论文精读</h1>
          <p>围绕 Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks，按动机、概率模型、组件训练、解码适配、实验消融和边界更新精读。</p>
        </div>
        <div class="box soft">
          <h3>继续学习</h3>
          <p>课程地图现在位于同级 <code>index.html</code>，这里保留为旧链接入口。</p>
          <a class="primary" href="index.html">打开课程地图</a>
        </div>
      </header>
    </main>
  </div>
</body>
</html>
